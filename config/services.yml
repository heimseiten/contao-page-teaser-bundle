services:
    _defaults:
        autowire: true
        autoconfigure: true

    # The content element is registered via the #[AsContentElement] attribute
    # on the controller (picked up through autoconfiguration).
    Heimseiten\ContaoPageTeaserBundle\Controller\ContentElement\TeaserElementController:
        public: true
        arguments:
            $studio: '@contao.image.studio'
            $urlGenerator: '@contao.routing.content_url_generator'
